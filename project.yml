name: BrewDesk
schemes:
  BrewDesk:
    build:
      targets:
        BrewDesk: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BrewDeskTests
options:
  bundleIdPrefix: com.brewdesk
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_APP_SANDBOX: false
targets:
  BrewDesk:
    type: application
    platform: macOS
    sources:
      - path: BrewDesk
    settings:
      base:
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_CFBundleDisplayName: BrewDesk
        GENERATE_INFOPLIST_FILE: true
        ENABLE_APP_SANDBOX: false
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_TESTING_SEARCH_PATHS: true
        PRODUCT_NAME: BrewDesk
        PRODUCT_MODULE_NAME: BrewDesk
    entitlements:
      path: BrewDesk/BrewDesk.entitlements
      properties:
        com.apple.security.app-sandbox: false
  BrewDeskTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: BrewDeskTests
    dependencies:
      - target: BrewDesk
        embed: false
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/BrewDesk.app/Contents/MacOS/BrewDesk"
        BUNDLE_LOADER: "$(TEST_HOST)"
        PRODUCT_NAME: BrewDeskTests
        PRODUCT_MODULE_NAME: BrewDeskTests
