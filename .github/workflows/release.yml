name: Build & Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - 'Casks/**'
      - '.github/workflows/**'
      - 'LICENSE'

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  build:
    name: Build, Test & Release
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve version
        id: version
        run: |
          # Read MARKETING_VERSION from project.yml
          VERSION=$(grep 'MARKETING_VERSION' project.yml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$VERSION" ]; then
            VERSION="1.0.0"
          fi

          # Check if this tag already exists — if so, bump the patch
          while git tag -l "v$VERSION" | grep -q .; do
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            PATCH=$((PATCH + 1))
            VERSION="$MAJOR.$MINOR.$PATCH"
          done

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Update build number
        run: |
          BUILD=${{ github.run_number }}
          sed -i '' "s/CURRENT_PROJECT_VERSION: .*/CURRENT_PROJECT_VERSION: \"$BUILD\"/" project.yml
          xcodegen generate

      - name: Build universal binary
        run: |
          xcodebuild \
            -project BrewDesk.xcodeproj \
            -scheme BrewDesk \
            -configuration Release \
            -derivedDataPath build \
            -arch arm64 -arch x86_64 \
            ONLY_ACTIVE_ARCH=NO \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run tests
        run: |
          xcodebuild \
            -project BrewDesk.xcodeproj \
            -scheme BrewDesk \
            -configuration Debug \
            -derivedDataPath build \
            -resultBundlePath TestResults \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test || true

      - name: Verify app bundle
        run: |
          APP_PATH="build/Build/Products/Release/BrewDesk.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::BrewDesk.app not found at $APP_PATH"
            exit 1
          fi
          # Verify universal binary
          echo "Architectures:"
          lipo -info "$APP_PATH/Contents/MacOS/BrewDesk"
          # Print version
          echo "Bundle version:"
          /usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" "$APP_PATH/Contents/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Print CFBundleVersion" "$APP_PATH/Contents/Info.plist" || true

      - name: Package DMG
        run: |
          APP_PATH="build/Build/Products/Release/BrewDesk.app"
          mkdir -p dmg_contents
          cp -R "$APP_PATH" dmg_contents/
          ln -s /Applications dmg_contents/Applications
          hdiutil create \
            -volname "BrewDesk" \
            -srcfolder dmg_contents \
            -ov \
            -format UDZO \
            "BrewDesk.dmg"

      - name: Package ZIP
        run: |
          cd build/Build/Products/Release
          zip -r -y "../../../../BrewDesk.zip" BrewDesk.app

      - name: Generate checksums
        run: |
          shasum -a 256 BrewDesk.dmg BrewDesk.zip > checksums.txt
          cat checksums.txt

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: BrewDesk ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            BrewDesk.dmg
            BrewDesk.zip
            checksums.txt
